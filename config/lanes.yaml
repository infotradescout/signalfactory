# Lane rules for LISA packet preparation.

default_lane: opportunity

lanes:
  macro:
    allowed_source_types: [world_bank, fred, model_output]
    recency_half_life_hours: 168
    retention_decay_hours: 336
    scoring_weights:
      truth: 0.30
      novelty: 0.15
      recency: 0.15
      relevance: 0.25
      corroboration: 0.10
      contradiction: 0.05
    contradiction_rules:
      stronger_source_wins: true
      require_manual_review_above: 0.45
    aggregation:
      max_signals_per_packet: 25
